name: auto-release-phase4

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: auto-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: contains(github.event.head_commit.message, '[phase4-release]')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags origin

      - name: Compute next version
        id: version
        shell: bash
        run: |
          latest="$(git tag -l 'v*' --sort=-v:refname | head -n1)"

          if [ -z "$latest" ]; then
            next="v0.4.0"
          else
            ver="${latest#v}"
            IFS='.' read -r major minor patch <<< "$ver"

            if [ "$major" = "0" ] && [ "$minor" = "3" ]; then
              next="v0.4.0"
            else
              next="v${major}.${minor}.$((patch + 1))"
            fi
          fi

          echo "latest=$latest" >> "$GITHUB_OUTPUT"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Fail if tag already exists
        shell: bash
        run: |
          if git rev-parse "${{ steps.version.outputs.next }}" >/dev/null 2>&1; then
            echo "Tag already exists: ${{ steps.version.outputs.next }}"
            exit 1
          fi

      - name: Create release payload
        shell: bash
        run: |
          next="${{ steps.version.outputs.next }}"
          repo="${{ github.event.repository.name }}"

          if [ "$repo" = "decision-passport-core" ]; then
            title="Decision Passport Core $next"
          else
            title="Decision Passport OpenClaw Lite $next"
          fi

          cat > release.json <<EOF
          {
            "tag_name": "$next",
            "target_commitish": "${{ github.sha }}",
            "name": "$title",
            "generate_release_notes": true,
            "make_latest": "true"
          }
          EOF

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            --data @release.json
