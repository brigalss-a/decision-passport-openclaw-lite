name: release
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test
      - run: pnpm demo

      - name: Generate checksums
        run: |
          pnpm checksums > checksums.txt
          cat checksums.txt

      - name: Collect release artifacts
        run: |
          mkdir -p release-artifacts
          cp checksums.txt release-artifacts/
          if [ -f artifacts/passport-lite-report.html ]; then
            cp artifacts/passport-lite-report.html release-artifacts/
          fi
          if [ -f artifacts/passport-lite-summary.json ]; then
            cp artifacts/passport-lite-summary.json release-artifacts/
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-artifacts/*
